{% extends 'main/base.html' %}

{% block content %}
<article class="blog-post">
    <h2>{{ post.title }}</h2>

    {% if post.preview_image %}
        <div class="blog-post-image">
            <img src="{{ post.preview_image.url }}" alt="{{ post.title }}" loading="lazy">
        </div>
    {% endif %}

    <div class="blog-post-body">
        {{ post.body|linebreaks }}
    </div>
</article>
{% endblock %}
